    Default: https://download3.rstudio.org/ubuntu-20.04/x86_64/shiny-server-1.5.23.1030-amd64.deb

Conditions:
  useUbuntu2404x86: !Equals [!Ref osVersion, "Ubuntu 24.04 (x86_64)"]

  displayPublicIP: !Equals [!Ref displayPublicIP, "Yes"]
  useElasticIP:
    !And [!Condition displayPublicIP, !Equals [!Ref assignStaticIP, "Yes"]]
  enableProtection: !Equals [!Ref ec2TerminationProtection, "Yes"]

  hasEIC:
    !Not [
      !Equals [
        !FindInMap [
          EICprefixMap,
          !Ref AWS::Region,
          IpPrefix,
          DefaultValue: 127.0.0.1/32,
        ],
        127.0.0.1/32,
      ],
    ]
  createSgEIC: !And [!Condition hasEIC, !Condition displayPublicIP]
  hasCFprefix:
    !Not [
      !Equals [
        !FindInMap [
          CFprefixMap,
          !Ref AWS::Region,
          PrefixList,
          DefaultValue: pl-none,
        ],
        pl-none,
      ],
    ]

  createSgSSH: !Equals [!Ref allowSSHport, "Yes"]

  hasR53Zone: !Equals [!Ref enableR53acmeSupport, "Yes"]

  createBackup: !Equals [!Ref enableBackup, "Yes"]

  createSgCf: !And [!Condition createCloudFront, !Condition hasCFprefix]
  createSgCfRStudio:
    !And [!Condition installRStudioServer, !Condition createSgCf]
  createSgCfShiny: !And [!Condition installShinyServer, !Condition createSgCf]

  enableCloudFront: !Equals [!Ref enableCloudFront, "Yes"]
  createCloudFront: !Or [!Condition createCfRStudio, !Condition createCfShiny]
  cloudFrontLogging:
    !And [!Condition createCloudFront, !Equals [!Ref cloudFrontLogging, "Yes"]]

  installRStudioServer: !Equals [!Ref installRStudioServer, "Yes"]
  installRStudioDesktop: !Equals [!Ref installRStudioDesktop, "Yes"]
  installShinyServer: !Equals [!Ref installShinyServer, "Yes"]

  createCfRStudio:
    !And [!Condition enableCloudFront, !Condition installRStudioServer]
  cfVPCOriginRStudio:
    !And [!Condition createCfRStudio, !Equals [!Ref originType, "VPC Origin"]]

  createCfShiny:
    !And [!Condition enableCloudFront, !Condition installShinyServer]
  cfVPCOriginShiny:
    !And [!Condition createCfShiny, !Equals [!Ref originType, "VPC Origin"]]

