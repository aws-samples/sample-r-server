  ec2Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT90M
    Metadata:
      Comment: Install Update files
      AWS::CloudFormation::Init:
        configSets:
          setup:
            - 00_setup
          dcv_install:
            - 00_dcv_install
          app_install:
            - 05_app_install
        00_setup: # in the following order: packages, groups, users, sources, files, commands, and then services.
          files:
            "/home/ubuntu/update-dcv":
              content: |
                #!/bin/bash
                cd /tmp
                OS_VERSION=$(. /etc/os-release;echo $VERSION_ID | sed -e 's/\.//g')
                sudo rm -f /tmp/nice-dcv-ubuntu$OS_VERSION-$(arch).tgz
                wget https://d1uj6qtbmh3dt5.cloudfront.net/nice-dcv-ubuntu$OS_VERSION-$(arch).tgz
                tar -xvzf nice-dcv-ubuntu$OS_VERSION-$(arch).tgz && cd nice-dcv-*-ubuntu$OS_VERSION-$(arch)
                sudo apt-get install -y ./nice-dcv-server_*.deb
                sudo apt-get install -y ./nice-dcv-web-viewer_*.deb
                sudo apt-get install -y ./nice-xdcv_*.deb
                sudo systemctl daemon-reload
              mode: "000755"
              owner: "ubuntu"
              group: "ubuntu"
            "/etc/systemd/system/dcv-virtual-session.service":
              content: |
                [Unit]
                Description=Create DCV virtual session
                After=default.target network.target

                [Service]
                ExecStart=/opt/dcv-virtual-session.sh

                [Install]
                WantedBy=default.target
              mode: "000644"
              owner: "root"
              group: "root"
            "/opt/dcv-virtual-session.sh":
              content: |
                #!/bin/bash
                dcvUsers=( "ubuntu" )
                while true;
                do
                  for dcvUser in "${dcvUsers[@]}"
                  do
                    if (! /usr/bin/dcv list-sessions | grep -q $dcvUser); then
                      /usr/bin/dcv create-session $dcvUser --owner $dcvUser --storage-root %home% --type virtual
                    fi
                  done
                  date
                  /usr/bin/dcv list-sessions
                  sleep 5
                done
              mode: "000744"
              owner: "root"
              group: "root"
            "/etc/systemd/system/dcv-post-reboot.service":
              content: |
                [Unit]
                Description=Post install tasks
                After=default.target network.target

                [Service]
                ExecStart=/bin/sh -c "/opt/dcv-post-reboot.sh 2>&1 | tee -a /var/log/install-sw.log"

                [Install]
                WantedBy=default.target
              mode: "000644"
              owner: "root"
              group: "root"
            "/opt/dcv-post-reboot.sh":
              content: !Sub |
                #!/bin/bash
                export DEBIAN_FRONTEND=noninteractive

                apt-get update -q
                apt-get upgrade -q -y

                # Add DCV ports
                if (systemctl status ufw | grep -q ufw); then
                  ufw allow 8443/tcp
                  ufw allow 8443/udp
                  ufw allow 8787/tcp
                  ufw allow 3838/tcp
                  ufw allow https
                  ufw allow http
                fi

                export installRStudioDesktop="${installRStudioDesktop}"
                case $installRStudioDesktop in
                  Yes)
                    systemctl enable --now dcv-virtual-session
                    systemctl enable --now dcvserver
                    ;;
                  No)
                    rm -f /etc/systemd/system/dcv-virtual-session.service
                    rm -f /opt/dcv-virtual-session.sh
                    rm -f /home/ubuntu/update-dcv
                    ;;
                esac

                # GPU driver for G/P instance : https://repost.aws/articles/ARWGxLArMBQ4y1MKoSHTq3gQ/
                apt-get install -q -y pciutils
                apt-get install -q -y amazon-ec2-utils
                if ( lspci | grep -q NVIDIA ); then
                  cd /tmp

                  DISTRO=$(. /etc/os-release;echo $ID$VERSION_ID | sed -e 's/\.//g')
                  if (arch | grep -q x86); then
                    ARCH=x86_64
                  else
                    ARCH=sbsa
                  fi
                  curl -L -O https://developer.download.nvidia.com/compute/cuda/repos/$DISTRO/$ARCH/cuda-keyring_1.1-1_all.deb
                  apt-get install -q -y ./cuda-keyring_1.1-1_all.deb
                  apt-get update 

                  if ( ec2-metadata -t | grep -q 6f\. ); then
                    # NVIDIA GRID: https://repost.aws/articles/ARBXrCH5wuStKWCXfIDdG4Ig/
                    apt-get install -q -y dkms linux-headers-aws linux-modules-extra-aws unzip gcc make libglvnd-dev pkg-config

                    if (lsb_release -r -s | grep -q 22); then
                      if (cat /proc/version | grep -q gcc-12); then
                        update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 12
                        update-alternatives --config gcc
                      fi
                    fi

                    aws s3 cp --recursive s3://ec2-linux-nvidia-drivers/latest/ . --no-sign-request
                    chmod +x NVIDIA-Linux-x86_64*.run

                    KERNEL_VERSION=$(ls -a /lib/modules | sort -V -r | head -n 1)
                    if (! uname -r | grep -q $KERNEL_VERSION ); then
                      ./NVIDIA-Linux-x86_64*.run -s --kernel-source-path=/lib/modules/$KERNEL_VERSION/build --kernel-name=$KERNEL_VERSION --skip-module-load
                      dkms autoinstall
                    else 
                      ./NVIDIA-Linux-x86_64*.run -s --skip-module-load
                    fi
                    modprobe nvidia
                    nvidia-smi
                    
                    echo "options nvidia NVreg_EnableGpuFirmware=0" | tee --append /etc/modprobe.d/nvidia.conf                   
                  else                      
                    VERSION=$(apt-cache search "nvidia-driver" | grep "^nvidia-driver-.*-server-open" | cut -d"-" -f3 | sort -r | head -1)
                    apt-get install -q -y linux-modules-nvidia-$VERSION-server-open-aws nvidia-headless-no-dkms-$VERSION-server-open nvidia-driver-$VERSION-server-open nvidia-utils-$VERSION-server
                    apt-get install -q -y nvidia-settings

                    if ( ec2-metadata -t | grep -q " p[0-9]" ); then
                      apt-get install -q -y nvidia-fabricmanager-$VERSION libnvidia-nscq-$VERSION
                      apt-get install -q -y nvidia-imex-$VERSION
                      if ( ec2-metadata -t | grep -q " p[6-9]" ); then
                        apt-get install -q -y nvlsm
                        apt-get install -q -y infiniband-diags
                        echo "ib_umad" | tee -a /etc/modules-load.d/modules.conf
                        modprobe ib_umad
                      fi
                      systemctl enable --now nvidia-fabricmanager
                    fi
                  fi
                fi

                # NVIDIA Container Toolkit: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html
                if ( which nvidia-smi ); then
                  if ( which docker ); then
                    if (! apt-cache search nvidia-container-toolkit | grep -q nvidia-container-toolkit); then
                      cd /tmp
                      curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg \
                        && curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
                        sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
                        sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
                    fi
                    apt-get update
                    apt-get install -q -y nvidia-container-toolkit
                    nvidia-ctk runtime configure --runtime=docker
                    systemctl restart docker
                  fi
                fi

                # IP address cert
                if ( echo "${installRStudioDesktop}" | grep -q -i "Yes" ); then
                  if [ "${displayPublicIP}" = "Yes" ]; then
                    # Some Regions create Elastic IP after EC2 instance is created
                    python3 /usr/local/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource ec2Instance --region ${AWS::Region}
                    sleep 45

                    IP_ADDR=$(curl -s checkip.amazonaws.com)
                    certbot certonly -n --agree-tos --standalone --preferred-profile shortlived --ip-address $IP_ADDR

                    # DCV TLS cert: https://docs.aws.amazon.com/dcv/latest/adminguide/manage-cert.html
                    if [ -d "/etc/letsencrypt/live/$IP_ADDR/" ]; then
                      cp -f /etc/letsencrypt/live/$IP_ADDR/fullchain.pem /etc/dcv/dcv.pem
                      cp -f /etc/letsencrypt/live/$IP_ADDR/privkey.pem /etc/dcv/dcv.key
                      chown dcv /etc/dcv/dcv.pem /etc/dcv/dcv.key
                      chmod 600 /etc/dcv/dcv.pem /etc/dcv/dcv.key

                      # post cert renewal hook
                      mv /opt/dcv-renew-cert.sh /etc/letsencrypt/renewal-hooks/post/
                    fi
                  fi
                fi
                if [ -f "/opt/dcv-renew-cert.sh" ]; then
                  rm /opt/dcv-renew-cert.sh
                fi

                python3 /usr/local/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource ec2Instance --region ${AWS::Region}

                rm -f /etc/systemd/system/dcv-post-reboot.service
                rm -f ${!0}
                systemctl daemon-reload
              mode: "000755"
              owner: "root"
              group: "root"
            "/opt/dcv-renew-cert.sh":
              content: |
                #!/bin/bash
                CERT_FOLDER=$(curl -s checkip.amazonaws.com)
                if [ -d "/etc/letsencrypt/live/$CERT_FOLDER/" ]; then
                  cp -f /etc/letsencrypt/live/$CERT_FOLDER/fullchain.pem /etc/dcv/dcv.pem
                  cp -f /etc/letsencrypt/live/$CERT_FOLDER/privkey.pem /etc/dcv/dcv.key
                  chown dcv /etc/dcv/dcv.pem /etc/dcv/dcv.key
                  chmod 600 /etc/dcv/dcv.pem /etc/dcv/dcv.key
                fi
              mode: "000755"
              owner: "root"
              group: "root"
            "/opt/aws/amazon-cloudwatch-agent/bin/config.json":
              content: |
                {
                    "agent": {
                        "metrics_collection_interval": 60,
                        "run_as_user": "cwagent"
                    },
                    "metrics": {
                        "namespace": "CWAgent",
                        "append_dimensions": {
                            "InstanceId": "${aws:InstanceId}"
                        },
                        "metrics_collected": {
                            "mem": {
                                "measurement": [
                                    "used_percent"
                                ]
                            },
                            "disk": {
                                "measurement": [
                                    "used_percent"
                                ],
                                "resources": [
                                    "/"
                                ]
                            }
                        }
                    }
                }
              mode: "000644"
              owner: "root"
              group: "root"
            "/etc/systemd/system/systemd-networkd-wait-online.service.d/override.conf":
              content: |

                [Service]
                ExecStart=
                ExecStart=/usr/lib/systemd/systemd-networkd-wait-online --timeout=3

              mode: "000644"
              owner: "root"
              group: "root"
            "/root/install-sw.sh":
              content: !Sub |
                #!/bin/bash
                mkdir -p /tmp/cfn
                cd /tmp/cfn
                export DEBIAN_FRONTEND=noninteractive

                # Change password
                PWD=$(cat /var/lib/cloud/data/instance-id)
                USER=ubuntu
                echo "$USER:$PWD" | chpasswd

                # Update OS
                apt-get update -q
                apt-get upgrade -q -y
                apt-get autoremove -q -y

                # Unattended 
                apt-get install -q -y unattended-upgrades

                # CloudWatch agent: https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/install-CloudWatch-Agent-commandline-fleet.html#download-CloudWatch-Agent-on-EC2-Instance-commandline-fleet
                if (arch | grep -q x86); then
                  curl -s -L -O https://amazoncloudwatch-agent.s3.amazonaws.com/ubuntu/amd64/latest/amazon-cloudwatch-agent.deb
                else
                  curl -s -L -O https://amazoncloudwatch-agent.s3.amazonaws.com/ubuntu/arm64/latest/amazon-cloudwatch-agent.deb
                fi
                apt-get install -q -y ./amazon-cloudwatch-agent.deb
                /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/bin/config.json -s
                systemctl enable --now amazon-cloudwatch-agent

                # USB and GPU driver DKMS
                apt-get update -q
                apt-get install -q -y dkms

                # Kernel headers for GPU and USB remotization
                apt-get install -q -y linux-image-aws
                apt-get install -q -y linux-headers-aws
                apt-get install -q -y linux-modules-extra-aws
                apt-get install -q -y usbutils

                # Docker: https://docs.docker.com/engine/install/ubuntu/
                # Add Docker's official GPG key
                apt-get install -q -y ca-certificates curl
                install -m 0755 -d /etc/apt/keyrings
                curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
                chmod a+r /etc/apt/keyrings/docker.asc
                # Add the repository to Apt sources
                echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
                  tee /etc/apt/sources.list.d/docker.list > /dev/null
                apt-get update -q
                apt-get install -q -y docker-ce
                systemctl enable docker
                usermod -aG docker ubuntu

                # AWS CLI: https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html
                apt-get remove -q -y awscli
                sudo snap install aws-cli --classic
                if [ -e /snap/bin/aws ]; then
                  rm -f /home/ubuntu/update-awscli
                else
                  /home/ubuntu/update-awscli
                fi
                echo "export AWS_CLI_AUTO_PROMPT=on-partial" >> /home/ubuntu/.bashrc

                # Certbot: https://eff-certbot.readthedocs.io/en/stable/install.html#snap-recommended
                sudo snap install certbot --classic
                if [ -e /snap/bin/certbot ]; then
                  ln -s /snap/bin/certbot /usr/bin/certbot
                  sudo snap set certbot trust-plugin-with-root=ok
                  sudo snap install certbot-dns-route53
                else
                  apt-get install -q -y python3-certbot python3-certbot-apache python3-certbot-nginx python3-certbot-dns-route53
                fi

                # Ubuntu 24.04: reduce systemd-networkd-wait-online.service 2+ min timeout
                if (lsb_release -r -s | grep -q 24); then
                  sed -i "s/systemd-networkd-wait-online$/& --timeout=3/g" /usr/lib/systemd/system/systemd-networkd-wait-online.service
                else
                  rm -f /etc/systemd/system/systemd-networkd-wait-online.service.d/override.conf
                fi
                systemctl daemon-reload

                # Disable Nouveau: https://docs.nvidia.com/ai-enterprise/deployment-guide-vmware/0.1.0/nouveau.html#ubuntu
                if (! cat /etc/modprobe.d/blacklist.conf | grep -q nouveau); then
                  echo "blacklist vga16fb" >> /etc/modprobe.d/blacklist.conf
                  echo "blacklist nouveau" >> /etc/modprobe.d/blacklist.conf
                  echo "blacklist rivafb" >> /etc/modprobe.d/blacklist.conf
                  echo "blacklist nvidiafb" >> /etc/modprobe.d/blacklist.conf
                  echo "blacklist rivatv" >> /etc/modprobe.d/blacklist.conf
                fi
                sed -i 's/^GRUB_CMDLINE_LINUX_DEFAULT="/GRUB_CMDLINE_LINUX_DEFAULT="rdblacklist=nouveau /g' /etc/default/grub
                update-grub

                rm -f ${!0}
              mode: "000740"
              owner: "root"
              group: "root"
          commands:
            install:
              command: "/root/install-sw.sh >> /var/log/install-sw.log 2>&1"
              ignoreErrors: "true"
        00_dcv_install:
          files:
            "/root/install-dcv.sh":
              content: !Sub |
                #!/bin/bash
                mkdir -p /tmp/cfn
                cd /tmp/cfn
                export DEBIAN_FRONTEND=noninteractive

                # Update OS
                apt-get update -q
                apt-get upgrade -q -y

                # DCV prereq: https://docs.aws.amazon.com/dcv/latest/adminguide/setting-up-installing-linux-prereq.html
                apt-get install -q -y ubuntu-desktop-minimal
                apt-get install -q -y gdm3
                apt-get install -q -y amazon-ec2-utils

                # Disable the Wayland protocol: https://docs.aws.amazon.com/dcv/latest/adminguide/setting-up-installing-linux-prereq.html#linux-prereq-wayland
                sed -i '/^\[daemon\]/a WaylandEnable=false' /etc/gdm3/custom.conf

                # resolve "/var/lib/dpkg/info/nice-dcv-server.postinst: 8: dpkg-architecture: not found" when installing dcv-server
                apt-get install -q -y dpkg-dev

                # Microphone redirection: https://docs.aws.amazon.com/dcv/latest/adminguide/setting-up-installing-linux-server.html
                apt-get install -q -y pulseaudio-utils
                apt-get install -q -y gnome-tweaks gnome-shell-extension-ubuntu-dock
                apt-get install -q -y gnome-shell-extension-manager

                # DCV: https://docs.aws.amazon.com/dcv/latest/adminguide/setting-up-installing-linux-server.html
                curl -s -L -O https://d1uj6qtbmh3dt5.cloudfront.net/NICE-GPG-KEY
                gpg --import NICE-GPG-KEY
                OS_VERSION=$(. /etc/os-release;echo $VERSION_ID | sed -e 's/\.//g')
                curl -s -L -O https://d1uj6qtbmh3dt5.cloudfront.net/nice-dcv-ubuntu$OS_VERSION-$(arch).tgz
                tar -xvzf nice-dcv-ubuntu*.tgz && cd nice-dcv-*-$(arch)
                apt-get install -q -y ./nice-dcv-server_*.deb
                apt-get install -q -y ./nice-dcv-web-viewer_*.deb
                usermod -aG video dcv
                apt-get install -q -y ./nice-xdcv_*.deb

                # Printer redirection: https://docs.aws.amazon.com/dcv/latest/adminguide/manage-printer.html
                apt-get install -q -y cups
                GROUP=$(cat /etc/cups/cups-files.conf | grep -oP "SystemGroup\s\K\w+")
                usermod -a -G $GROUP dcv
                systemctl enable cups

                # QUIC: https://docs.aws.amazon.com/dcv/latest/adminguide/enable-quic.html
                cp /etc/dcv/dcv.conf /etc/dcv/dcv.conf."`date +"%Y-%m-%d"`"
                sed -i "s/^#enable-quic-frontend=true/enable-quic-frontend=true/g" /etc/dcv/dcv.conf

                # Higher web client max resolution: https://docs.aws.amazon.com/dcv/latest/adminguide/config-param-ref.html
                sed -i "/^\[display/a web-client-max-head-resolution=(4096, 2160)" /etc/dcv/dcv.conf
                # Console session support
                sed -i "/^\[session-management\/automatic-console-session/a owner=\"ubuntu\"\nstorage-root=\"%home%\"" /etc/dcv/dcv.conf

                # Disable reporting : https://wiki.ubuntu.com/Apport
                sed -i "s/enabled=1/enable=0/g" /etc/default/apport
                apt-get remove -q -y ubuntu-report whoopsie apport
                apt-get autoremove -q -y
                # Disable upgrade prompt: https://help.ubuntu.com/community/Upgrades#Upgrade_policy
                sed -i "s/Prompt=lts/Prompt=never/g" /etc/update-manager/release-upgrades
                chown -R ubuntu:ubuntu /home/ubuntu/.config

                # Ubuntu 24.04: reduce systemd-networkd-wait-online.service 2+ min timeout
                if (lsb_release -r -s | grep -q 24); then
                  sed -i "s/systemd-networkd-wait-online$/& --timeout=3/g" /usr/lib/systemd/system/systemd-networkd-wait-online.service
                fi

                # Google Chrome: https://www.google.com/linuxrepositories/
                curl -fSsL https://dl.google.com/linux/linux_signing_key.pub | gpg --dearmor | sudo tee /usr/share/keyrings/google-chrome.gpg > /dev/null
                echo deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main | sudo tee /etc/apt/sources.list.d/google-chrome.list
                apt-get update -q
                apt-get install -q -y google-chrome-stable

                # Microsoft Edge: https://learn.microsoft.com/en-us/linux/packages
                curl -fSsL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor | sudo tee /usr/share/keyrings/microsoft-edge.gpg > /dev/null
                echo 'deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-edge.gpg] https://packages.microsoft.com/repos/edge stable main' | sudo tee /etc/apt/sources.list.d/microsoft-edge.list
                apt-get update -q
                apt-get install -q -y microsoft-edge-stable

                #
                systemctl daemon-reload
                systemctl enable dcv-virtual-session
                systemctl enable dcvserver

                rm -f ${!0}
              mode: "000740"
              owner: "root"
              group: "root"
            "/home/ubuntu/.gnomerc":
              content: |
                export XDG_CURRENT_DESKTOP=ubuntu:GNOME
                export GNOME_SHELL_SESSION_MODE=ubuntu
                export XDG_DATA_DIRS=/usr/share/gnome:/usr/local/share:/usr/share:/var/lib/snapd/desktop
              mode: "000644"
              owner: "ubuntu"
              group: "ubuntu"
            "/etc/skel/.gnomerc":
              content: |
                export XDG_CURRENT_DESKTOP=ubuntu:GNOME
                export GNOME_SHELL_SESSION_MODE=ubuntu
                export XDG_DATA_DIRS=/usr/share/gnome:/usr/local/share:/usr/share:/var/lib/snapd/desktop
              mode: "000644"
              owner: "root"
              group: "root"
            "/home/ubuntu/.config/gnome-initial-setup-done":
              content: |
                yes
              mode: "000664"
              owner: "ubuntu"
              group: "ubuntu"
            "/etc/skel/.config/gnome-initial-setup-done":
              content: |
                yes
              mode: "000644"
              owner: "root"
              group: "root"
          commands:
            install:
              command: "/root/install-dcv.sh > /var/log/install-dcv.log 2>&1"
              ignoreErrors: "true"
        05_app_install:
          files:
            "/root/install-r.sh":
              content: !Sub |
                #!/bin/bash
                mkdir -p /tmp/cfn
                cd /tmp/cfn

                export DEBIAN_FRONTEND=noninteractive

                # R: https://cran.r-project.org/bin/linux/ubuntu/
                apt-get install -q -y --no-install-recommends software-properties-common dirmngr
                # add the signing key (by Michael Rutter) for these repos
                # To verify key, run gpg --show-keys /etc/apt/trusted.gpg.d/cran_ubuntu_key.asc 
                # Fingerprint: E298A3A825C0D65DFD57CBB651716619E084DAB9
                wget -qO- https://cloud.r-project.org/bin/linux/ubuntu/marutter_pubkey.asc | tee -a /etc/apt/trusted.gpg.d/cran_ubuntu_key.asc
                # add the repo from CRAN -- lsb_release adjusts to 'noble' or 'jammy' or ... as needed
                add-apt-repository -y "deb https://cloud.r-project.org/bin/linux/ubuntu $(lsb_release -cs)-cran40/"
                # install R itself
                apt-get -q -y install --no-install-recommends r-base

                # Paws (AWS SDK for R): https://github.com/paws-r/paws#installation
                apt-get install -q -y libcurl4-openssl-dev libssl-dev libxml2-dev
                sudo su - -c "R -e \"install.packages('paws', repos = c(pawsr = 'https://paws-r-builds.s3.amazonaws.com/packages/latest/', CRAN = 'https://cloud.r-project.org'))\""

                # reticulate (R Interface to Python): https://rstudio.github.io/reticulate/
                apt-get install -q -y python3-venv
                apt-get install -q -y libpng-dev
                sudo su - -c "R -e \"install.packages('reticulate', repos='https://cran.rstudio.com/')\""

                # RStudio server: https://posit.co/download/rstudio-server/
                rm -f *.deb
                if [ "${installRStudioServer}" = "Yes" ]; then
                  curl -s -L -O ${RStudioServerURL}
                  apt-get install -q -y ./*.deb
                  systemctl enable rstudio-server
                fi

                # RStudio desktop: https://posit.co/download/rstudio-desktop/
                rm -f *.deb
                if [ "${installRStudioDesktop}" = "Yes" ]; then
                  curl -s -L -O ${RStudioDesktopURL}
                  apt-get install -q -y ./*.deb

                  rm -f *.deb

                  curl -s -L -O ${PositronURL}
                  apt-get install -q -y ./*.deb
                fi

                # Shiny Server: https://posit.co/download/shiny-server/
                rm -f *.deb
                if [ "${installShinyServer}" = "Yes" ]; then
                  sudo su - -c "R -e \"install.packages('shiny', repos='https://cran.rstudio.com/')\""
                  sudo su - -c "R -e \"install.packages('rmarkdown', repos='https://cran.rstudio.com/')\""
                  curl -s -L -O ${ShinyServerURL}
                  apt-get install -q -y ./*.deb
                  systemctl enable shiny-server
                fi

                # git
                apt-get install -q -y git

                # GDebi
                apt-get install -q -y gdebi-core

                rm -f ${!0}
              mode: "000740"
              owner: "root"
              group: "root"
          commands:
            install:
              command: "/root/install-r.sh > /var/log/install-r.log 2>&1"
              ignoreErrors: "true"
    Properties:
      ImageId: # https://ubuntu.com/server/docs/cloud-images/amazon-ec2 https://ubuntu.com/blog/ubuntu-pro-is-now-part-of-the-aws-ec2-console
        !If [
          useUbuntu2404x86,
          "{{resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id}}",
          "{{resolve:ssm:/aws/service/canonical/ubuntu/pro-server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id}}",
        ]
      InstanceType: !Ref instanceType
      IamInstanceProfile: !Ref instanceProfile
      KeyName: !Ref ec2KeyPair
      SubnetId: !Ref subnetID
      Monitoring: true
      DisableApiTermination: !If [enableProtection, true, false]
      EbsOptimized: true
      SecurityGroupIds:
        - !Ref sgEC2Instance
        - !If [createSgCfRStudio, !Ref sgRStudioServerIPv4, !Ref AWS::NoValue]
        - !If [createSgCfRStudio, !Ref sgRStudioServerIPv6, !Ref AWS::NoValue]
        - !If [createSgCfShiny, !Ref sgShinyServerIPv4, !Ref AWS::NoValue]
        - !If [createSgCfShiny, !Ref sgShinyServerIPv6, !Ref AWS::NoValue]
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeType: !Ref volumeType
            VolumeSize: !Ref volumeSize
            DeleteOnTermination: true
            Encrypted: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          mkdir -p /tmp/cfn
          cd /tmp/cfn

          export DEBIAN_FRONTEND=noninteractive

          systemctl stop apt-daily.timer apt-daily-upgrade.timer
          apt-get clean all
          apt-get update -q
          sleep 20
          apt-get install -q -y procps
          pkill apt
          pkill dpkg
          apt-get install -q -y wget tmux unzip tar curl sed

          # CfN scripts: https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/cfn-helper-scripts-reference.html
          apt-get install -q -y python3 python3-pip python3-setuptools python3-docutils python3-daemon
          curl -s -L -O https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz
          tar -xf aws-cfn-bootstrap-py3-latest.tar.gz
          cd aws-cfn-bootstrap-2.0
          python3 setup.py build > /var/log/install-cfn-helper.log 2>&1
          python3 setup.py install >> /var/log/install-cfn-helper.log 2>&1
          cd /tmp/cfn
          export CFN_INIT="python3 /usr/local/bin/cfn-init"

          $CFN_INIT -v --stack ${AWS::StackName} --resource ec2Instance --region ${AWS::Region} -c setup

          # Install desktop environment and DCV?
          if [ "${installRStudioDesktop}" = "Yes" ]; then
            $CFN_INIT -v --stack ${AWS::StackName} --resource ec2Instance --region ${AWS::Region} -c dcv_install
          fi

          # R
          $CFN_INIT -v --stack ${AWS::StackName} --resource ec2Instance --region ${AWS::Region} -c app_install

          #
          systemctl set-default multi-user.target
          systemctl daemon-reload
          systemctl enable dcv-post-reboot

          sleep 1 && reboot
      Tags:
        - Key: Name
          Value: !Ref ec2Name
        - Key: StackName
          Value: !Ref AWS::StackName
        - Key: StackId
          Value: !Ref AWS::StackId
        - Key: GitHub
          Value: https://github.com/aws-samples/sample-r-server

  elasticIP:
    Condition: useElasticIP
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      NetworkBorderGroup: !Ref AWS::Region
      InstanceId: !Ref ec2Instance
      Tags:
        - Key: StackName
          Value: !Ref AWS::StackName
        - Key: StackId
          Value: !Ref AWS::StackId
        - Key: Name
          Value: !Sub
            - "${AWS::StackName}-elasticIP-${UID}"
            - UID:
                !Select [
                  3,
                  !Split ["-", !Select [2, !Split ["/", !Ref AWS::StackId]]],
                ]
        - Key: GitHub
          Value: https://github.com/aws-samples/sample-r-server

  backupPlan:
    Type: AWS::Backup::BackupPlan
    Condition: createBackup
    Properties:
      BackupPlan:
        BackupPlanName: !Sub
          - "${AWS::StackName}-backupPlan-${UID}"
          - UID:
              !Select [
                3,
                !Split ["-", !Select [2, !Split ["/", !Ref AWS::StackId]]],
              ]
        BackupPlanRule:
          - RuleName: !Sub
              - "${AWS::StackName}-backupRule-${UID}"
              - UID:
                  !Select [
                    3,
                    !Split ["-", !Select [2, !Split ["/", !Ref AWS::StackId]]],
                  ]
            TargetBackupVault: !Ref backupVault
            ScheduleExpression: !Ref scheduleExpression
            ScheduleExpressionTimezone: !Ref scheduleExpressionTimezone
            Lifecycle:
              DeleteAfterDays: !Ref deleteAfterDays
      BackupPlanTags:
        {
          "StackName": !Ref AWS::StackName,
          "StackId": !Ref AWS::StackId,
          "GitHub": "https://github.com/aws-samples/sample-r-server",
        }

  backupVault:
    Type: AWS::Backup::BackupVault
    Condition: createBackup
    UpdateReplacePolicy: Delete
    Properties:
      BackupVaultName: !Sub
        - "${AWS::StackName}-backupVault-${UID}"
        - UID:
            !Select [
              3,
              !Split ["-", !Select [2, !Split ["/", !Ref AWS::StackId]]],
            ]
      BackupVaultTags:
        {
          "StackName": !Ref AWS::StackName,
          "StackId": !Ref AWS::StackId,
          "GitHub": "https://github.com/aws-samples/sample-r-server",
        }

  backupSelection:
    Type: AWS::Backup::BackupSelection
    Condition: createBackup
    Properties:
      BackupPlanId: !Ref backupPlan
      BackupSelection:
        IamRoleArn: !GetAtt backupRestoreRole.Arn
        Resources:
          - !Sub arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/${ec2Instance}
        SelectionName: !Sub
          - "${AWS::StackName}-backupSelection-${UID}"
          - UID:
              !Select [
                3,
                !Split ["-", !Select [2, !Split ["/", !Ref AWS::StackId]]],
              ]

  backupRestoreRole:
    Type: AWS::IAM::Role
    Condition: createBackup
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: restore-EC2-instance-profile
          PolicyDocument: # https://docs.aws.amazon.com/aws-backup/latest/devguide/restoring-ec2.html
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt instanceIamRole.Arn
      ManagedPolicyArns:
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
        - !Sub arn:${AWS::Partition}:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForRestores
      Tags:
        - Key: StackName
          Value: !Ref AWS::StackName
        - Key: StackId
          Value: !Ref AWS::StackId
        - Key: GitHub
          Value: https://github.com/aws-samples/sample-r-server

  cfVPCOriginRStudio:
    Type: AWS::CloudFront::VpcOrigin
    Condition: cfVPCOriginRStudio
    Properties:
      VpcOriginEndpointConfig:
        Arn: !Sub arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/${ec2Instance}
        Name: !Sub ${AWS::StackName}-${ec2Instance}-RStudioServer
        OriginProtocolPolicy: http-only
        HTTPPort: 8787
        OriginSSLProtocols:
          - TLSv1.2
      Tags:
        - Key: StackName
          Value: !Ref AWS::StackName
        - Key: StackId
          Value: !Ref AWS::StackId
        - Key: GitHub
          Value: https://github.com/aws-samples/sample-r-server

  cfDistributionRStudio:
    Type: AWS::CloudFront::Distribution
    Condition: createCfRStudio
    DependsOn: ec2Instance
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W70
            reason: "TLSv1.2_2025 is enabled"
    #checkov:skip=CKV_AWS_68: "Unable to associate WAF for stacks launched outside us-east-1 Region. User to associate WAF manually or subscribe flat-rate CloudFront plan with WAF"
    #checkov:skip=CKV_AWS_86: "Access Logging is enabled"
    #checkov:skip=CKV_AWS_174: "TLSv1.2_2025 is enabled"
    Properties:
      DistributionConfig:
        Origins:
          - !If
            - cfVPCOriginRStudio
            - DomainName: !GetAtt ec2Instance.PrivateDnsName
              Id: !Ref ec2Instance
              VpcOriginConfig:
                VpcOriginId: !GetAtt cfVPCOriginRStudio.Id
            - DomainName: !GetAtt ec2Instance.PublicDnsName
              Id: !Ref ec2Instance
              CustomOriginConfig:
                OriginProtocolPolicy: http-only
                HTTPPort: 8787
                OriginSSLProtocols:
                  - TLSv1.2
        Enabled: true
        Comment: !Sub ${AWS::StackName}-RStudioServer
        HttpVersion: http2and3
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
          MinimumProtocolVersion: TLSv1.2_2025
        DefaultCacheBehavior:
          AllowedMethods: !Split [",", "GET,HEAD,OPTIONS,PUT,PATCH,POST,DELETE"]
          CachedMethods:
            - "HEAD"
            - "GET"
          Compress: true
          CachePolicyId: "4cc15a8a-d715-48a4-82b8-cc0b614638fe"
          OriginRequestPolicyId: "216adef6-5c7f-47e4-b989-5492eafa07d3"
          ResponseHeadersPolicyId: "67f7725c-6f97-4210-82d7-5512b31e9d03"
          TargetOriginId: !Ref ec2Instance
          ViewerProtocolPolicy: "redirect-to-https"
        Logging: !If
          - cloudFrontLogging
          - Bucket: !GetAtt cfLogBucket.DomainName
            IncludeCookies: false
            Prefix: "RStudioServer/"
          - !Ref AWS::NoValue
      Tags:
        - Key: StackName
          Value: !Ref AWS::StackName
        - Key: StackId
          Value: !Ref AWS::StackId
        - Key: GitHub
          Value: https://github.com/aws-samples/sample-r-server

  cfLogBucket:
    Type: AWS::S3::Bucket
    Condition: cloudFrontLogging
    Metadata:
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: Delete-Previous-Versions
            NoncurrentVersionExpiration:
              NoncurrentDays: 1
            Status: Enabled
          - Id: Delete-Expired-Delete-Marker
            ExpiredObjectDeleteMarker: true
            Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Ref cfS3AccessLogBucket
        LogFilePrefix: !Sub "${AWS::StackName}/"
      Tags:
        - Key: StackName
          Value: !Ref AWS::StackName
        - Key: StackId
          Value: !Ref AWS::StackId
        - Key: GitHub
          Value: https://github.com/aws-samples/sample-r-server

  cfLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: cloudFrontLogging
    Properties:
      Bucket: !Ref cfLogBucket
      PolicyDocument:
        Statement:
          - Effect: Deny
            Action: "*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"
            Principal: "*"
            Resource: !Sub "${cfLogBucket.Arn}/*"
          - !If
            - createCfRStudio
            - Sid: AllowCloudFrontServicePrincipalRStudio
              Effect: Allow
              Principal:
                Service: "cloudfront.amazonaws.com"
              Action: "s3:PutObject"
              Resource: !Sub "arn:${AWS::Partition}:s3:::${cfLogBucket}/*"
              Condition:
                StringEquals:
                  "AWS:SourceArn": !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${cfDistributionRStudio}"
            - !Ref AWS::NoValue
          - !If
            - createCfShiny
            - Sid: AllowCloudFrontServicePrincipalShiny
              Effect: Allow
              Principal:
                Service: "cloudfront.amazonaws.com"
              Action: "s3:PutObject"
              Resource: !Sub "arn:${AWS::Partition}:s3:::${cfLogBucket}/*"
              Condition:
                StringEquals:
                  "AWS:SourceArn": !Sub "arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${cfDistributionShiny}"
            - !Ref AWS::NoValue

  cfS3AccessLogBucket:
    Type: AWS::S3::Bucket
    Condition: cloudFrontLogging
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: "Bucket stores access logs"
    #checkov:skip=CKV_AWS_18: "Bucket stores access logs"
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: Delete-Previous-Versions
            NoncurrentVersionExpiration:
              NoncurrentDays: 1
            Status: Enabled
          - Id: Delete-Expired-Delete-Marker
            ExpiredObjectDeleteMarker: true
            Status: Enabled
      Tags:
        - Key: StackName
          Value: !Ref AWS::StackName
        - Key: StackId
          Value: !Ref AWS::StackId
        - Key: GitHub
          Value: https://github.com/aws-samples/sample-r-server

  cfS3AccessLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: cloudFrontLogging
    Properties:
      Bucket: !Ref cfS3AccessLogBucket
      PolicyDocument: # https://docs.aws.amazon.com/AmazonS3/latest/userguide/enable-server-access-logging.html
        Statement:
          - Effect: Deny
            Action: "*"
            Condition:
              Bool:
                "aws:SecureTransport": "false"
            Principal: "*"
            Resource: !Sub "${cfS3AccessLogBucket.Arn}/*"
          - Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${cfS3AccessLogBucket.Arn}/*"
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  cfVPCOriginShiny:
    Type: AWS::CloudFront::VpcOrigin
    Condition: cfVPCOriginShiny
    Properties:
      VpcOriginEndpointConfig:
        Arn: !Sub arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/${ec2Instance}
        Name: !Sub ${AWS::StackName}-${ec2Instance}-ShinyServer
        OriginProtocolPolicy: http-only
        HTTPPort: 3838
        OriginSSLProtocols:
          - TLSv1.2
      Tags:
        - Key: StackName
          Value: !Ref AWS::StackName
        - Key: StackId
          Value: !Ref AWS::StackId
        - Key: GitHub
          Value: https://github.com/aws-samples/sample-r-server

  cfDistributionShiny:
    Type: AWS::CloudFront::Distribution
    Condition: createCfShiny
    DependsOn: ec2Instance
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W70
            reason: "TLSv1.2_2025 is enabled"
    #checkov:skip=CKV_AWS_68: "Unable to associate WAF for stacks launched outside us-east-1 Region. User to associate WAF manually or subscribe flat-rate CloudFront plan with WAF"
    #checkov:skip=CKV_AWS_86: "Access Logging is enabled"
    #checkov:skip=CKV_AWS_174: "TLSv1.2_2025 is enabled"
    Properties:
      DistributionConfig:
        Origins:
          - !If
            - cfVPCOriginShiny
            - DomainName: !GetAtt ec2Instance.PrivateDnsName
              Id: !Ref ec2Instance
              VpcOriginConfig:
                VpcOriginId: !GetAtt cfVPCOriginShiny.Id
            - DomainName: !GetAtt ec2Instance.PublicDnsName
              Id: !Ref ec2Instance
              CustomOriginConfig:
                OriginProtocolPolicy: http-only
                HTTPPort: 3838
                OriginSSLProtocols:
                  - TLSv1.2
        Enabled: true
        Comment: !Sub ${AWS::StackName}-ShinyServer
        HttpVersion: http2and3
        WebACLId: !Ref AWS::NoValue
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
          MinimumProtocolVersion: TLSv1.2_2025
        DefaultCacheBehavior:
          AllowedMethods: !Split [",", "GET,HEAD,OPTIONS,PUT,PATCH,POST,DELETE"]
          CachedMethods:
            - "HEAD"
            - "GET"
          Compress: true
          CachePolicyId: "4cc15a8a-d715-48a4-82b8-cc0b614638fe"
          OriginRequestPolicyId: "216adef6-5c7f-47e4-b989-5492eafa07d3"
          ResponseHeadersPolicyId: "67f7725c-6f97-4210-82d7-5512b31e9d03"
          TargetOriginId: !Ref ec2Instance
          ViewerProtocolPolicy: "redirect-to-https"
        Logging: !If
          - cloudFrontLogging
          - Bucket: !GetAtt cfLogBucket.DomainName
            IncludeCookies: false
            Prefix: "ShinyServer/"
          - !Ref AWS::NoValue
      Tags:
        - Key: StackName
          Value: !Ref AWS::StackName
        - Key: StackId
          Value: !Ref AWS::StackId
        - Key: GitHub
          Value: https://github.com/aws-samples/sample-r-server

Outputs:
  EC2console:
    Description: EC2 console
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/ec2/home?region=${AWS::Region}#InstanceDetails:instanceId=${ec2Instance}"

  EC2instanceID:
    Description: EC2 Instance ID
    Value: !Ref ec2Instance

  EC2instanceConnect:
    Condition: createSgEIC
    Description: EC2 Instance Connect
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/ec2-instance-connect/ssh?connType=standard&instanceId=${ec2Instance}&osUser=ubuntu&sshPort=22#/"

  EC2serialConsole:
    Description: EC2 Serial Console
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/ec2-instance-connect/ssh?connType=serial&instanceId=${ec2Instance}&serialPort=0#/"

  EC2iamRole:
    Description: EC2 IAM role
    Value: !Sub
      - "https://console.aws.amazon.com/iam/home#/roles/details/${role}"
      - role: !Select [1, !Split ["/", !GetAtt instanceIamRole.Arn]]

  SSMsessionManager:
    Description: SSM Session Manager (" sudo passwd ubuntu " to change login user password)
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/session-manager/${ec2Instance}"

  DCVUrl:
    Condition: installRStudioDesktop
    Description: DCV URL ( login as ubuntu )
    Value:
      !If [
        displayPublicIP,
        !Sub "https://${ec2Instance.PublicIp}:8443/?username=ubuntu  ( dcv://ubuntu:@${ec2Instance.PublicIp} )",
        !Sub "https://${ec2Instance.PrivateIp}:8443/?username=ubuntu ( dcv://ubuntu:@${ec2Instance.PrivateIp} )",
      ]

  CloudFrontConsole:
    Condition: createCloudFront
    Description: CloudFront console
    Value: !Sub "https://console.aws.amazon.com/cloudfront/?region=${AWS::Region}"

  RStudioServerUrl:
    Condition: createCfRStudio
    Description: RStudio Server URL ( login as ubuntu )
    Value: !Sub "https://${cfDistributionRStudio.DomainName}"

  ShinyServerUrl:
    Condition: createCfShiny
    Description: Shiny Server URL
    Value: !Sub "https://${cfDistributionShiny.DomainName}"
