  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: R Applications
        Parameters:
          - installRStudioServer
          - installRStudioDesktop
          - installShinyServer
      - Label:
          default: EC2
        Parameters:
          - ec2Name
          - ec2KeyPair
          - osVersion
          - instanceType
          - ec2TerminationProtection
      - Label:
          default: Network
        Parameters:
          - vpcID
          - subnetID
          - displayPublicIP
          - assignStaticIP
      - Label:
          default: Remote access
        Parameters:
          - ingressIPv4
          - ingressIPv6
          - allowSSHport
      - Label:
          default: EBS volume
        Parameters:
          - volumeSize
          - volumeType
      - Label:
          default: Amazon CloudFront
        Parameters:
          - enableCloudFront
          - originType
          - cloudFrontLogging
      - Label:
          default: AWS Backup
        Parameters:
          - enableBackup
          - scheduleExpression
          - scheduleExpressionTimezone
          - deleteAfterDays
      - Label:
          default: Posit download URLs
        Parameters:
          - RStudioServerURL
          - RStudioDesktopURL
          - PositronURL
          - ShinyServerURL
      - Label:
          default: Others
        Parameters:
          - enableR53acmeSupport

    ParameterLabels:
      installRStudioServer:
        default: "Install RStudio Server"
      installRStudioDesktop:
        default: "Install RStudio Desktop and Positron IDEs"
      installShinyServer:
        default: "Install Shiny Server"
      enableR53acmeSupport:
        default: "Enable Route 53 ACME protocol DNS-01 challenge support"

      ec2Name:
        default: "EC2 instance name"
      ec2KeyPair:
        default: "Key pair"
      osVersion:
        default: "OS version"
      instanceType:
        default: "Instance type (x86_64)"
      ec2TerminationProtection:
        default: "Enable EC2 termination protection to prevent accidental deletion"

      volumeSize:
        default: "Volume size (GiB)"
      volumeType:
        default: "Volume type"

      vpcID:
        default: "VPC with outbound internet connectivity"
      subnetID:
        default: "Subnet in selected VPC with outbound internet IPv4 connectivity"
      displayPublicIP:
        default: "EC2 instance in public subnet with public IP assigned?"
      assignStaticIP:
        default: "Elastic IP: assign static public internet IPv4 address"

      ingressIPv4:
        default: "Allowed source prefix (IPv4)"
      ingressIPv6:
        default: "Allowed source prefix (IPv6)"
      allowSSHport:
        default: "Allow SSH from network"

      enableBackup:
        default: "Backup EC2 instance"
      scheduleExpression:
        default: "CRON expression specifying when AWS Backup initiates a backup job"
      scheduleExpressionTimezone:
        default: "Timezone to set backup schedule"
      deleteAfterDays:
        default: "Number of days after creation that a recovery point (backup) is deleted"

      enableCloudFront:
        default: "Create Amazon CloudFront distribution"
      originType:
        default: "CloudFront origin type"
      cloudFrontLogging:
        default: "Enable CloudFront logging"

      RStudioServerURL:
        default: "RStudio Server (Ubuntu 24.04): https://posit.co/download/rstudio-server/"
      RStudioDesktopURL:
        default: "RStudio Desktop (Ubuntu 24.04): https://posit.co/download/rstudio-desktop/"
      PositronURL:
        default: "Positron: https://positron.posit.co/download.html"
      ShinyServerURL:
        default: "Shiny Server: https://posit.co/download/shiny-server/"

Parameters:
  installRStudioServer:
    Type: String
    Description: https://posit.co/products/open-source/rstudio-server/
    AllowedValues:
      - "Yes"
      - "No"
    Default: "Yes"
  installRStudioDesktop:
    Type: String
    Description: https://posit.co/products/open-source/rstudio/ https://posit.co/products/ide/positron/
    AllowedValues:
      - "Yes"
      - "No"
    Default: "No"
  installShinyServer:
    Type: String
    Description: https://posit.co/products/open-source/shiny-server/
    AllowedValues:
      - "Yes"
      - "No"
    Default: "No"
  enableR53acmeSupport:
    Type: String
    Description: https://certbot.eff.org/  https://certbot-dns-route53.readthedocs.io/
    AllowedValues:
      - "Yes"
      - "No"
    Default: "Yes"

  osVersion:
    Type: String
    Description: Ubuntu ( https://ubuntu.com/aws )
    AllowedValues:
      - Ubuntu 24.04 (x86_64)
      - Ubuntu Pro 24.04 (x86_64)
    Default: Ubuntu 24.04 (x86_64)

  ec2Name:
    Type: String
    # Description: EC2 instance name
    Default: R Server
  ec2KeyPair:
    Type: AWS::EC2::KeyPair::KeyName
    Description: https://console.aws.amazon.com/ec2/#KeyPairs
    AllowedPattern: .+
    ConstraintDescription: Select a key pair
  instanceType:
    Type: String
    Description: https://console.aws.amazon.com/ec2/#InstanceTypes
    AllowedPattern: "^[a-z\\-\\d\\.]+$"
    ConstraintDescription: Specify valid EC2 instance type
    Default: m7i.large
  ec2TerminationProtection:
    Type: String
    Description: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/Using_ChangingDisableAPITermination.html
    Default: "Yes"
    AllowedValues:
      - "Yes"
      - "No"

  vpcID:
    Type: AWS::EC2::VPC::Id
    Description: "https://console.aws.amazon.com/vpcconsole/home#vpcs:"
    AllowedPattern: .+
    ConstraintDescription: Select a VPC
  subnetID:
    Type: AWS::EC2::Subnet::Id
    Description: "https://console.aws.amazon.com/vpcconsole/home#subnets:"
    AllowedPattern: .+
    ConstraintDescription: Select a Subnet
  displayPublicIP:
    Type: String
    Description: Select No if instance has no public IPv4 address
    AllowedValues:
      - "Yes"
      - "No"
    Default: "Yes"
  assignStaticIP:
    Type: String
    Description: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/elastic-ip-addresses-eip.html
    AllowedValues:
      - "Yes"
      - "No"
    Default: "Yes"

  ingressIPv4:
    Type: String
    Description: e.g. 1.2.3.4/32, get your internet IPv4 address from https://checkip.amazonaws.com
    AllowedPattern: "^\\d+\\.\\d+\\.\\d+\\.\\d+\\/\\d+$"
    ConstraintDescription: Specify valid IPv4 prefix
    Default: 0.0.0.0/0
  ingressIPv6:
    Type: String
    Description: e.g. 1:2:3:4::/64, get your internet IPv6 address (if any) with tools such as https://ifconfig.co
    AllowedPattern: .+
    ConstraintDescription: Specify valid IPv6 prefix
    Default: ::/0
  allowSSHport:
    Type: String
    Description: https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/connect-linux-inst-ssh.html
    AllowedValues:
      - "Yes"
      - "No"
    Default: "Yes"

  volumeSize:
    Type: Number
    Description: https://docs.aws.amazon.com/ebs/latest/userguide/volume_constraints.html
    MinValue: 20
    MaxValue: 16384
    Default: 50
  volumeType:
    Type: String
    Description: https://aws.amazon.com/ebs/general-purpose/
    AllowedValues:
      - gp3
      - gp2
    Default: gp3

  enableBackup:
    Type: String
    Description: https://docs.aws.amazon.com/aws-backup/
    AllowedValues:
      - "Yes"
      - "No"
    Default: "No"
  scheduleExpression:
    Type: String
    Description: https://docs.aws.amazon.com/eventbridge/latest/userguide/eb-scheduled-rule-pattern.html
    AllowedPattern: .+
    Default: "cron(0 1 ? * * *)"
  scheduleExpressionTimezone: # https://nodatime.org/TimeZones?version=2024a&format=json
    Type: String
